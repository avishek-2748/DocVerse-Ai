version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: docverse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: docverse
    ports:
      - "5432:5432"
    volumes:
      - docverse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docverse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docverse-backend
    ports:
      - "5000:5000"
    environment:
      # Override the DATABASE_URL to point to the 'db' service instead of 'localhost'
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/docverse
      # Ensure you pass your .env file in the backend directory or copy variables here
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docverse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  docverse_pgdata:
